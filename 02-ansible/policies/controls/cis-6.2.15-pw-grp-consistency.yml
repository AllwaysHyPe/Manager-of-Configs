---
# CIS Linux 2.0.0 - 6.2.15: Ensure all groups in /etc/passwd exist in /etc/group

- name: "CIS 6.2.15 - Ensure all groups in /etc/passwd exist in /etc/group"
  hosts: all
  gather_facts: false
  become: true
  become_method: sudo
  become_user: root

  vars_files:
    - vars/cis_remediation_vars.yml

  vars:
    _script_src: "{{ playbook_dir }}/scripts/fix_6_2_15_passwd_group_consistency.sh"
    _script_dst: "{{ cis_script_staging_path | default('/tmp') }}/fix_6_2_15_passwd_group_consistency.sh"

  tasks:
    - name: "Detect OS type"
      ansible.builtin.shell: uname -s
      register: os_check
      changed_when: false
      ignore_errors: true

    - name: "Skip non-Linux hosts"
      meta: end_host
      when: os_check is failed or 'Linux' not in (os_check.stdout | default(''))

    - name: "Copy remediation script to host"
      ansible.builtin.copy:
        src: "{{ _script_src }}"
        dest: "{{ _script_dst }}"
        mode: '0700'

    - name: "Execute CIS 6.2.15 remediation"
      ansible.builtin.shell: >-
        sudo bash -c 'CIS_LOG_PATH={{ cis_log_path | default("/var/log/cis-remediation.log") }}
        {{ _script_dst }}'
      register: result

    - name: "Show output"
      debug:
        msg: "{{ result.stdout_lines }}"

    - name: "Assert success"
      fail:
        msg: "CIS 6.2.15 remediation failed on {{ inventory_hostname }}. Manual review required."
      when: result.rc != 0

    - name: "Cleanup script"
      ansible.builtin.file:
        path: "{{ _script_dst }}"
        state: absent
      ignore_errors: true