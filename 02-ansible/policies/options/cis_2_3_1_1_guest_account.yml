---
cis_control:
  id: "2.3.1.1"
  title: "Ensure guest account is disabled"
  level: 1
  scored: true
  description: >
    The built-in Guest account allows unauthenticated access to the server.
    It should be disabled on all systems.
  rationale: >
    An enabled guest account provides an unauthenticated path into the system.
    Disabling it removes a low-effort attack vector.
  remediation:
    type: win_user
    name: Guest
    account_disabled: true
  references:
    - "https://www.cisecurity.org/benchmark/microsoft_windows_server"