---
# Applied to servers tagged role=webserver.
# Inherits the base_windows baseline.
# Level 2 controls are selectively excluded where they conflict
# with IIS authentication requirements.

role:
  name: web_server
  description: >
    CIS baseline for IIS web servers. Inherits base_windows.
  level2_enabled: false

  inherits:
    - roles/base_windows.yml

  additional_controls: []

  excluded_controls: []