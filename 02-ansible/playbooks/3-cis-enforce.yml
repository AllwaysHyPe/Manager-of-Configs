---
# Applies CIS policy and remediates drift.
# Run 0-audit.yml with --check first to review what will change.
#
# Usage:
#   ansible-playbook playbooks/1-cis-enforce.yml \
#     -i inventory/azure_rm.yml
#
# Run nightly to catch and fix drift automatically.
# Servers already compliant generate zero changes.
# Servers that drifted get corrected silently.

- name: CIS Windows Server 2022 — enforce
  hosts: role_webserver
  gather_facts: true

  vars:
    cis_level1: true
    cis_level2: false

  pre_tasks:
    - name: Record remediation start time
      set_fact:
        remediation_start: "{{ ansible_date_time.iso8601 }}"

  tasks:

    - name: "CIS 1.1.1 | L1 | Ensure password history is 24 or more"
      win_security_policy:
        section: System Access
        key: PasswordHistorySize
        value: "24"
      when: cis_level1

    - name: "CIS 2.3.1.1 | L1 | Ensure guest account is disabled"
      win_user:
        name: Guest
        account_disabled: true
      when: cis_level1

    - name: "CIS 9.1.1 | L1 | Ensure domain firewall profile is enabled"
      win_firewall:
        profiles: Domain
        state: enabled
      when: cis_level1

    - name: "CIS 18.3.3 | L1 | Disable SMBv1 client driver"
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Services\mrxsmb10'
        name: Start
        data: 4
        type: dword
      when: cis_level1

    - name: "CIS 18.9.85.2 | L2 | Disable WDigest authentication"
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest'
        name: UseLogonCredential
        data: 0
        type: dword
      when: cis_level1 and cis_level2

  post_tasks:
    - name: Report remediation run
      debug:
        msg: >
          Remediation complete on {{ inventory_hostname }}.
          Started: {{ remediation_start }}.
          Any tasks marked changed above represent drift that has been corrected.