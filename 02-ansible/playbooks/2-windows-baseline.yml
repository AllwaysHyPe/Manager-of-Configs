---
# Windows configuration baseline
# Usage:
#   ansible-playbook playbooks/2-windows-baseline.yml -i inventory/azure_rm.yml
#
#   Audit only (no changes):
#   ansible-playbook playbooks/2-windows-baseline.yml \
#     -i inventory/azure_rm.yml --check --diff

- name: Windows configuration baseline
  hosts: role_webserver
  gather_facts: true
  become: true
  become_method: ansible.builtin.runas
  become_user: SYSTEM

  tasks:
    - name: "Ensure Windows Firewall service is running"
      ansible.windows.win_service:
        name: MpsSvc
        state: started
        start_mode: auto

    - name: "Ensure Remote Registry service is disabled"
      ansible.windows.win_service:
        name: RemoteRegistry
        state: stopped
        start_mode: disabled

    - name: "Ensure Windows Update service is running"
      ansible.windows.win_service:
        name: wuauserv
        state: started
        start_mode: auto

    - name: "Disable TLS 1.0"
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.0\Server'
        name: Enabled
        data: 0
        type: dword

    - name: "Disable TLS 1.1"
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.1\Server'
        name: Enabled
        data: 0
        type: dword

    - name: "Enable Windows Firewall for all profiles"
      ansible.windows.win_firewall:
        profiles:
          - Domain
          - Private
          - Public
        state: enabled

    - name: "Ensure RDP firewall rule exists and is enabled"
      ansible.windows.win_firewall:
        name: Remote Desktop - User Mode (TCP-In)
        enabled: true
        state: present

    - name: "Ensure Telnet Client is not installed"
      ansible.windows.win_feature:
        name: Telnet-Client
        state: absent

    - name: "Ensure SNMP Service is not installed"
      ansible.windows.win_feature:
        name: SNMP-Service
        state: absent

    - name: "Ensure interactive logon requires Ctrl+Alt+Del"
      community.windows.win_security_policy:
        section: System Access
        key: DisableCAD
        value: "0"

    - name: "Set account lockout threshold to 5 attempts"
      community.windows.win_security_policy:
        section: System Access
        key: LockoutBadCount
        value: "5"

    - name: "Set account lockout duration to 15 minutes"
      community.windows.win_security_policy:
        section: System Access
        key: LockoutDuration
        value: "15"