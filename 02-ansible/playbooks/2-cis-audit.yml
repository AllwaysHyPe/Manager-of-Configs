---
# Run this first. Always.
# Check mode means nothing changes — this is a compliance report.
#
# Usage:
#   ansible-playbook playbooks/0-audit.yml \
#     -i inventory/azure_rm.yml \
#     --check --diff

- name: CIS Windows Server 2022 — audit
  hosts: role_webserver
  gather_facts: true

  vars:
    # Set cis_level2 to true for database servers or high-security environments.
    cis_level1: true
    cis_level2: false

  pre_tasks:
   - name: Set up Arc SSH proxy
     azure.azcollection.azure_rm_arcssh:
       inventory_hostname: "{{ item }}"
       ansible_host: "{{ hostvars[item].ansible_host }}"
       local_user: "{{ hostvars[item].ansible_user }}"
       resource_group: "{{ hostvars[item].resource_group }}"
       resource_type: "{{ hostvars[item].resource_type }}"
       ssh_config_file: "/tmp/{{ hostvars[item].resource_group }}-{{ item }}/ssh_config"
       ssh_relay_file: "/tmp/{{ hostvars[item].resource_group }}-{{ item }}/relay_info"
       ssh_proxy_folder: "~/.clientsshproxy"
     loop: "{{ groups['type_Microsoft_HybridCompute_machines'] | default([]) }}"
     delegate_to: localhost
     run_once: true

  tasks:

    - name: "CIS 1.1.1 | L1 | Ensure password history is 24 or more"
      win_security_policy:
        section: System Access
        key: PasswordHistorySize
        value: "24"
      when: cis_level1

    - name: "CIS 2.3.1.1 | L1 | Ensure guest account is disabled"
      win_user:
        name: Guest
        account_disabled: true
      when: cis_level1

    - name: "CIS 9.1.1 | L1 | Ensure domain firewall profile is enabled"
      win_firewall:
        profiles: Domain
        state: enabled
      when: cis_level1

    - name: "CIS 18.3.3 | L1 | Disable SMBv1 client driver"
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Services\mrxsmb10'
        name: Start
        data: 4
        type: dword
      when: cis_level1

    - name: "CIS 18.9.85.2 | L2 | Disable WDigest authentication"
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest'
        name: UseLogonCredential
        data: 0
        type: dword
      when: cis_level1 and cis_level2