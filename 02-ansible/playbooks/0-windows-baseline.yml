---
# Windows configuration baseline
# Usage:
#   ansible-playbook playbooks/0-windows-baseline.yml -i inventory/azure_rm.yml
#
#   Audit only (no changes):
#   ansible-playbook playbooks/0-windows-baseline.yml \
#     -i inventory/azure_rm.yml --check --diff

- name: Windows configuration baseline
  hosts: role_webserver
  gather_facts: true

  pre_tasks:
    - name: Set up Arc SSH proxy
      azure.azcollection.azure_rm_arcssh:
        inventory_hostname: "{{ item }}"
        ansible_host: "{{ hostvars[item].ansible_host }}"
        local_user: "{{ hostvars[item].ansible_user }}"
        resource_group: "{{ hostvars[item].resource_group }}"
        resource_type: "{{ hostvars[item].resource_type }}"
        ssh_config_file: "/tmp/{{ hostvars[item].resource_group }}-{{ item }}/ssh_config"
        ssh_relay_file: "/tmp/{{ hostvars[item].resource_group }}-{{ item }}/relay_info"
        ssh_proxy_folder: "~/.clientsshproxy"
      loop: "{{ groups['type_Microsoft_HybridCompute_machines'] | default([]) }}"
      delegate_to: localhost
      run_once: true

  tasks:
    - name: "Ensure Windows Firewall service is running"
      ansible.windows.win_service:
        name: MpsSvc
        state: started
        start_mode: auto

    - name: "Ensure Remote Registry service is disabled"
      ansible.windows.win_service:
        name: RemoteRegistry
        state: stopped
        start_mode: disabled

    - name: "Ensure Windows Update service is running"
      ansible.windows.win_service:
        name: wuauserv
        state: started
        start_mode: auto

    - name: "Disable TLS 1.0"
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.0\Server'
        name: Enabled
        data: 0
        type: dword

    - name: "Disable TLS 1.1"
      ansible.windows.win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\SCHANNEL\Protocols\TLS 1.1\Server'
        name: Enabled
        data: 0
        type: dword

    - name: "Enable Windows Firewall for all profiles"
      ansible.windows.win_firewall:
        profiles:
          - Domain
          - Private
          - Public
        state: enabled

    - name: "Ensure RDP firewall rule exists and is enabled"
      community.windows.win_firewall_rule:
        name: Remote Desktop - User Mode (TCP-In)
        enabled: true
        state: present

    - name: "Ensure Telnet Client is not installed"
      ansible.windows.win_feature:
        name: Telnet-Client
        state: absent

    - name: "Ensure SNMP Service is not installed"
      ansible.windows.win_feature:
        name: SNMP-Service
        state: absent