---
- name: 'Demo Bootstrapping'
  hosts: 'role_webserver'
  gather_facts: true
  become: true
  become_method: runas
  become_user: SYSTEM
  
  vars:
    nexus_base: 'https://chocolatey.allwayshype.com/nexus/repository'
    nexus_url: '{{ nexus_base }}/ChocolateyInternal/index.json'
    choco_install_script: '{{ nexus_base }}/choco-install/ChocolateyInstall.ps1'
    nexus_password: "{{ lookup('ansible.builtin.env', 'NEXUS_PASSWORD') }}"
    c4b_cert: "{{ lookup('ansible.builtin.env', 'C4B_CERT') }}"

  pre_tasks:
    - name: Set up Arc SSH proxy
      azure.azcollection.azure_rm_arcssh:
        inventory_hostname: "{{ item }}"
        ansible_host: "{{ hostvars[item].ansible_host }}"
        local_user: "{{ hostvars[item].ansible_user }}"
        resource_group: "{{ hostvars[item].resource_group }}"
        resource_type: "{{ hostvars[item].resource_type }}"
        ssh_config_file: "/tmp/{{ hostvars[item].resource_group }}-{{ item }}/ssh_config"
        ssh_relay_file: "/tmp/{{ hostvars[item].resource_group }}-{{ item }}/relay_info"
        ssh_proxy_folder: "~/.clientsshproxy"
      loop: "{{ groups['type_Microsoft_HybridCompute_machines'] | default([]) }}"
      delegate_to: localhost
      run_once: true

  tasks:
    - name: Trust Chocolatey self-signed certificate
      ansible.windows.win_powershell:
        script: |
          $CertBase64 = $AnsibleCertData
          $CertBytes = [System.Convert]::FromBase64String($CertBase64)
          $Cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($CertBytes)

          foreach ($StoreName in @('Root', 'TrustedPeople')) {
              $Store = [System.Security.Cryptography.X509Certificates.X509Store]::new(
                  $StoreName,
                  [System.Security.Cryptography.X509Certificates.StoreLocation]::LocalMachine
              )
              $Store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)

              if ($Cert.Thumbprint -notin $Store.Certificates.Thumbprint) {
                  $Store.Add($Cert)
                  $Ansible.Changed = $true
              }

              $Store.Close()
          }
        parameters:
          $AnsibleCertData: "{{ c4b_cert }}"

    - name: Install Chocolatey from internal repository
      ansible.windows.win_powershell:
        script: |
          [System.Net.ServicePointManager]::ServerCertificateValidationCallback = { $true }
          $webClient = New-Object System.Net.WebClient
          $webClient.Credentials = [System.Net.NetworkCredential]::new('chocouser', $Password)
          $script = $webClient.DownloadString($InstallScript)
          $env:chocolateyDownloadUrl = $NupkgUrl
          & ([scriptblock]::Create($script))

          # Ensure choco.exe is in the system PATH permanently
          $ChocoBin = 'C:\ProgramData\chocolatey\bin'
          $CurrentPath = [System.Environment]::GetEnvironmentVariable('PATH', 'Machine')
          if ($ChocoBin -notin ($CurrentPath -split ';')) {
              [System.Environment]::SetEnvironmentVariable(
                  'PATH',
                  "$CurrentPath;$ChocoBin",
                  'Machine'
              )
          }
        parameters:
          $InstallScript: '{{ choco_install_script }}'
          $NupkgUrl: '{{ nexus_base }}/ChocolateyInternal/v3/content/chocolatey/latest/chocolatey.latest.nupkg'
          $Password: '{{ nexus_password }}'
      no_log: true

    - name: Configure sources and install Chocolatey packages
      ansible.windows.win_powershell:
        script: |
          $env:PATH = 'C:\ProgramData\chocolatey\bin;' + $env:PATH

          choco source add --name='ChocolateyInternal' --source=$NexusUrl --user='chocouser' --password=$Password --priority=1 --allow-self-service -y

          choco source disable --name='Chocolatey' -y
          choco source disable --name='chocolatey.licensed' -y

          choco upgrade chocolatey-license --confirm --source='ChocolateyInternal' --no-progress
          choco upgrade chocolatey.extension --confirm --source='ChocolateyInternal' --no-progress
        parameters:
          $NexusUrl: '{{ nexus_url }}'
          $Password: '{{ nexus_password }}'
      no_log: true
...