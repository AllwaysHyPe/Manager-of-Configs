- name: Import Chocolatey Variables
  ansible.builtin.include_vars:
    file: vars/choco.yml

- name: Fetch Chocolatey secrets from Key Vault
  ansible.builtin.shell: |
    az keyvault secret show \
      --vault-name {{ keyvault_name }} \
      --name {{ item.secret }} \
      --query value \
      --output tsv
  delegate_to: localhost
  no_log: true
  loop:
    - { secret: 'ccmClientCommunicationSalt', var: 'ccm_client' }
    - { secret: 'ccmServiceCommunicationSalt', var: 'ccm_service' }
    - { secret: 'ChocoUserPassword', var: 'repo_password' }
    - { secret: 'chococertpassword', var: 'cert_password' }
  register: choco_secrets

- name: Build Chocolatey secrets dictionary
  ansible.builtin.set_fact:
    choco: "{{ choco | default({}) | combine({ item.item.var: item.stdout | trim }) }}"    
  no_log: true
  loop: "{{ choco_secrets.results }}"

- name: Create temp directory
  ansible.windows.win_file:
    path: C:\Temp\ChocoSetup
    state: directory

- name: Download SSL certificate from Key Vault
  ansible.builtin.shell: |
    rm -f /tmp/chocolatey.pfx
    az keyvault certificate download \
      --vault-name {{ keyvault_name }} \
      --name {{ certificate_name }} \
      --file /tmp/chocolatey.pfx \
      --encoding PEM
  delegate_to: localhost

- name: Copy SSL certificate to client
  ansible.windows.win_copy:
    src: /tmp/chocolatey.pfx
    dest: C:\Temp\ChocoSetup\chocolatey.pfx

- name: Import SSL certificate to Trusted Root CA store
  ansible.windows.win_certificate_store:
    path: C:\Temp\ChocoSetup\chocolatey.pfx
    password: "{{ choco.cert_password }}"
    store_location: LocalMachine
    store_name: Root
    state: present

- name: Copy Chocolatey client setup script
  ansible.windows.win_copy:
    src: scripts/ClientSetup.ps1
    dest: C:\Temp\ChocoSetup\ClientSetup.ps1

- name: Run Chocolatey client setup script
  ansible.windows.win_shell: |
    C:\Temp\ChocoSetup\ClientSetup.ps1 `
      -Fqdn "{{ chocolatey_fqdn }}" `
      -ClientCommunicationSalt "{{ choco.ccm_client }}" `
      -ServiceCommunicationSalt "{{ choco.ccm_service }}" `
      -RepositoryCredential ([System.Net.NetworkCredential]@{
        userName = 'chocouser'
        password = '{{ choco.repo_password }}'
      })
  args:
    executable: powershell.exe
  no_log: true

- name: Cleanup temp directory
  ansible.windows.win_file:
    path: C:\Temp\ChocoSetup
    state: absent