---
- name: "Onboard Windows Servers to Azure Arc-enabled servers with Public endpoint connectivity"
  hosts: all
  vars_files:
    - ../demo/vars/secrets.yml
    - ../vars/azure.yml
    
  tasks:
      - name: Check if Connected Machine Agent installer already exists
        win_stat:
          path: C:\AzureConnectedMachineAgent.msi
        register: azcmagent_win_downloaded
        when: ansible_facts['os_family'] == 'Windows'

      - name: Download the Connected Machine Agent on Windows servers
        win_get_url:
          url: https://aka.ms/AzureConnectedMachineAgent
          dest: C:\AzureConnectedMachineAgent.msi
        when: 
          - ansible_facts['os_family'] == 'Windows'
          - not (azcmagent_win_downloaded.stat.exists | default(false))

      - name: Install the Connected Machine Agent on Windows servers
        win_package:
          path: C:\AzureConnectedMachineAgent.msi
        when: 
          - ansible_facts['os_family'] == 'Windows'
          - not (azcmagent_win_downloaded.stat.exists | default(false))

      - name: Check if the Connected Machine Agent has already been connected on Windows
        win_command: azcmagent show
        register: azcmagent_win_connected
        when: ansible_facts['os_family'] == 'Windows'
        ignore_errors: true
        failed_when: azcmagent_win_connected.rc not in [0, 16]
        changed_when: false

      - name: Disconnect the Connected Machine Agent if cert error detected
        win_shell: '& "$env:ProgramFiles\AzureConnectedMachineAgent\azcmagent.exe" disconnect --service-principal-id "{{ azure.service_principal_id }}" --service-principal-secret "{{ azure.service_principal_secret }}"'
        when:
          - ansible_facts['os_family'] == 'Windows'
          - "'Unable to acquire token' in azcmagent_win_connected.stdout"

      - name: Connect the Connected Machine Agent on Windows servers to Azure Arc
        win_shell: '& "$env:ProgramFiles\AzureConnectedMachineAgent\azcmagent.exe" connect --service-principal-id "{{ azure.service_principal_id }}" --service-principal-secret "{{ azure.service_principal_secret }}" --resource-group "{{ azure.resource_group }}" --tenant-id "{{ azure.tenant_id }}" --location "{{ azure.location }}" --subscription-id "{{ azure.subscription_id }}" --tags "Environment=demo,Purpose=Manager of Configs Demo"'
        when:
        - ansible_facts['os_family'] == 'Windows'
        - "'Disconnected' in azcmagent_win_connected.stdout"