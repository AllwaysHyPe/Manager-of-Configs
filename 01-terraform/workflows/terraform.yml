name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.repository }}-terraform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stage:
          - 00-base
          - 01-storage-account
          - 02-avm-storage
          - 03-windows-vm

    steps:
      # see: https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@v6.0.2

      # see: https://github.com/hashicorp/setup-terraform/tree/v3
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: terraform/${{ matrix.stage }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/${{ matrix.stage }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: terraform/${{ matrix.stage }}