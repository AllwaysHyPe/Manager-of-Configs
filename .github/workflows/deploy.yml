name: Deploy

on:
  push:
    branches: [main]
    paths:
      - '01-terraform/**'
      - '02-ansible/**'
      - '03-chocolatey/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate (${{ matrix.stage }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stage:
          - 00-base
          - 01-storage-account
          - 02-avm-storage
          - 03-windows-vm

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check
        working-directory: 01-terraform/${{ matrix.stage }}

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: 01-terraform/${{ matrix.stage }}

      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: 01-terraform/${{ matrix.stage }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: 01-terraform/03-windows-vm
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.ARM_RG_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.ARM_STG_NAME }}" \
            -backend-config="container_name=${{ secrets.ARM_CONTAINER_NAME }}" \
            -backend-config="key=mgr-of-configs/03-windows-vm.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform plan
        working-directory: 01-terraform/03-windows-vm
        run: terraform plan -out=tfplan -no-color

      - name: Terraform apply
        working-directory: 01-terraform/03-windows-vm
        run: terraform apply tfplan

      - name: Capture Terraform outputs
        id: tf
        working-directory: 01-terraform/03-windows-vm
        run: |
          VM_PASSWORD=$(terraform output -raw vm_admin_password)
          echo "vm_password=$VM_PASSWORD" >> $GITHUB_OUTPUT

          VM_IP=$(terraform output -raw vm_public_ip)
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "Windows VM public IP: $VM_IP"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and dependencies
        run: |
          pip install ansible pywinrm
          ansible-galaxy collection install -r 02-ansible/requirements.yml --force
          pip install -r ~/.ansible/collections/ansible_collections/azure/azcollection/requirements.txt

      - name: Verify dynamic inventory
        env:
          AZURE_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ANSIBLE_WINDOWS_PASSWORD: ${{ steps.tf.outputs.vm_password }}
        run: |
          ansible-inventory \
            -i 02-ansible/inventory/azure_rm.yml \
            --list

      - name: Audit — compliance report, no changes
        env:
          AZURE_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ANSIBLE_WINDOWS_PASSWORD: ${{ steps.tf.outputs.vm_password }}
        run: |
          ansible-playbook 02-ansible/playbooks/0-audit.yml \
            -i 02-ansible/inventory/azure_rm.yml \
            --check --diff