name: Ansible

on:
  workflow_dispatch:
    inputs:
      check_mode:
        description: 'Check mode (no changes)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - '02-ansible/**'

concurrency:
  group: ${{ github.repository }}-ansible-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ANSIBLE_WINDOWS_PASSWORD: ${{ secrets.WINDOWS_VM_PASSWORD }}
  SRV_ADMIN_USER: ${{ secrets.SRV_ADMIN_USER }}
  SRV_ADMIN_PASSWORD: ${{ secrets.SRV_ADMIN_PASSWORD }}
  ARC_SP_CLIENT_ID: ${{ secrets.ARC_SP_CLIENT_ID }}
  ARC_SP_CLIENT_SECRET: ${{ secrets.ARC_SP_CLIENT_SECRET }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ansible:
    name: Ansible
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and dependencies
        run: |
          pip install ansible pywinrm
          ansible-galaxy collection install -r 02-ansible/requirements.yml --force
          pip install -r ~/.ansible/collections/ansible_collections/azure/azcollection/requirements.txt

      - name: Verify dynamic inventory
        run: |
          ansible-inventory \
            -i 02-ansible/inventory/azure_rm.yml \
            --list
            
      - name: Install Az SSH extension
        run: az extension add --name ssh --yes

      - name: Windows baseline
        run: |
          ansible-playbook 02-ansible/playbooks/0-windows-baseline.yml \
            -i 02-ansible/inventory/azure_rm.yml \
            ${{ github.event.inputs.check_mode == 'true' && '--check --diff' || '' }}