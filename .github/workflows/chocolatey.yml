name: Chocolatey

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Playbook to run'
        type: choice
        options:
          - 0-bootstrap
          - 1-packagemgmt
          - 2-conf-features
          - bonus-1-legacy-windows
          - bonus-2-ccm-client
        default: '1-packagemgmt'
      check_mode:
        description: 'Check mode (no changes)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - '03-chocolatey/**'

concurrency:
  group: ${{ github.repository }}-chocolatey-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ANSIBLE_WINDOWS_PASSWORD: ${{ secrets.WINDOWS_VM_PASSWORD }}
  SRV_ADMIN_USER: ${{ secrets.SRV_ADMIN_USER }}
  SRV_ADMIN_PASSWORD: ${{ secrets.SRV_ADMIN_PASSWORD }}
  NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
  CCM_FQDN: ${{ secrets.CCM_FQDN }}
  CCM_CLIENT_SALT: ${{ secrets.CCM_CLIENT_SALT }}
  CCM_SERVICE_SALT: ${{ secrets.CCM_SERVICE_SALT }}
  C4B_CERT: ${{ secrets.C4B_CERT }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANSIBLE_CONFIG: 02-ansible/ansible.cfg

jobs:
  chocolatey:
    name: Chocolatey (${{ github.event.inputs.playbook }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Ansible
        id: cache-ansible
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ hashfiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Ansible and dependencies
        run: |
          pip install ansible pywinrm
          ansible-galaxy collection install -r 02-ansible/requirements.yml --force
          pip install -r ~/.ansible/collections/ansible_collections/azure/azcollection/requirements.txt

      - name: Verify dynamic inventory
        run: |
          ansible-inventory \
            -i 02-ansible/inventory/azure_rm.yml \
            --list

      - name: Install Az SSH extension
        run: az extension add --name ssh --yes

      - name: Run playbook
        run: |
          ansible-playbook 03-chocolatey/${{ github.event.inputs.playbook }}.yml \
            -i 02-ansible/inventory/azure_rm.yml \
            ${{ github.event.inputs.check_mode == 'true' && '--check --diff' || '' }}